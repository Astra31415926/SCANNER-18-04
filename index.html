<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCI Lab Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #333;
            --text: #e0e0e0;
            --red: #FF004D;
            --green: #00FF41;
            --blue: #0088FF;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Tabs & LED Bar */
        .header-container {
            background: #000;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tabs { display: flex; }
        .tab {
            flex: 1; padding: 15px; text-align: center; font-weight: 600; cursor: pointer;
            opacity: 0.4; border-bottom: 3px solid transparent; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .tab.active { opacity: 1; border-bottom-color: var(--text); }
        .tab.r.active { border-bottom-color: var(--red); color: var(--red); }
        .tab.g.active { border-bottom-color: var(--green); color: var(--green); }
        .tab.b.active { border-bottom-color: var(--blue); color: var(--blue); }

        /* LED Bar */
        .led-bar { display: flex; justify-content: center; gap: 30px; padding: 10px; background: #111; }
        .led-item { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: bold; color: #555; }
        .led-circle { width: 12px; height: 12px; border-radius: 50%; background-color: #222; transition: all 0.1s; }
        
        .led-item.r.active .led-circle { background-color: var(--red); box-shadow: 0 0 10px var(--red); }
        .led-item.r.active { color: var(--red); }
        .led-item.g.active .led-circle { background-color: var(--green); box-shadow: 0 0 10px var(--green); }
        .led-item.g.active { color: var(--green); }
        .led-item.b.active .led-circle { background-color: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .led-item.b.active { color: var(--blue); }

        /* Main Content */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 20px; }

        /* Canvas Area */
        .canvas-wrapper {
            position: relative; width: 100%; background: #000;
            display: flex; justify-content: center; align-items: center; height: 250px;
            border-bottom: 1px solid var(--border);
        }
        #canvas-display { max-width: 100%; max-height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #video-source { display: none; }

        /* Controls */
        .controls-panel {
            padding: 15px; background: var(--surface); border-radius: 12px;
            margin: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .slider-group { margin-bottom: 15px; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 2px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
        .slider-val { color: var(--text); background: #222; padding: 1px 6px; border-radius: 4px; }
        
        /* Range Metrics */
        .range-metrics { font-size: 10px; color: #888; margin-top: 2px; margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; height: 12px; }
        .range-metrics span { color: var(--green); font-weight: bold; }
        .range-metrics em { color: #555; font-style: normal; }

        input[type=range] { width: 100%; background: transparent; -webkit-appearance: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--text); -webkit-appearance: none; margin-top: -6px; cursor: pointer; }
        .tab.r input[type=range]::-webkit-slider-thumb { background: var(--red); }
        .tab.g input[type=range]::-webkit-slider-thumb { background: var(--green); }
        .tab.b input[type=range]::-webkit-slider-thumb { background: var(--blue); }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; padding: 0 15px; margin-top: 15px; }
        .btn-start { flex: 2; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-load { flex: 2; padding: 12px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-reset-ranges { flex: 1; padding: 12px; background: transparent; color: var(--red); border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab r active" onclick="switchTab('R')">RED</div>
            <div class="tab g" onclick="switchTab('G')">GREEN</div>
            <div class="tab b" onclick="switchTab('B')">BLUE</div>
        </div>
        <!-- LED Bar -->
        <div class="led-bar">
            <div class="led-item r" id="led-r"><div class="led-circle"></div><span>R</span></div>
            <div class="led-item g" id="led-g"><div class="led-circle"></div><span>G</span></div>
            <div class="led-item b" id="led-b"><div class="led-circle"></div><span>B</span></div>
        </div>
    </div>

    <div class="main-container">
        <!-- Canvas Display -->
        <div class="canvas-wrapper">
            <canvas id="canvas-display" width="480" height="480"></canvas>
            <video id="video-source" playsinline></video>
        </div>

        <!-- Controls -->
        <div class="controls-panel">
            <!-- Offset -->
            <div class="slider-group">
                <div class="slider-header"><span>Offset</span><span class="slider-val" id="val-offset">0</span></div>
                <input type="range" id="sl-offset" min="-100" max="100" value="0" step="1" oninput="updateParam('offset', this.value)">
                <div class="range-metrics" id="range-offset"><em>Диапазон: —</em></div>
            </div>
            <!-- Gain -->
            <div class="slider-group">
                <div class="slider-header"><span>Gain</span><span class="slider-val" id="val-gain">1.0</span></div>
                <input type="range" id="sl-gain" min="0.0" max="5.0" value="1.0" step="0.1" oninput="updateParam('gain', this.value)">
                <div class="range-metrics" id="range-gain"><em>Диапазон: —</em></div>
            </div>
            <!-- k1 -->
            <div class="slider-group">
                <div class="slider-header"><span id="label-k1">k1</span><span class="slider-val" id="val-k1">0.0</span></div>
                <input type="range" id="sl-k1" min="0.0" max="2.0" value="0.0" step="0.01" oninput="updateParam('k1', this.value)">
                <div class="range-metrics" id="range-k1"><em>Диапазон: —</em></div>
            </div>
            <!-- k2 -->
            <div class="slider-group">
                <div class="slider-header"><span id="label-k2">k2</span><span class="slider-val" id="val-k2">0.0</span></div>
                <input type="range" id="sl-k2" min="0.0" max="2.0" value="0.0" step="0.01" oninput="updateParam('k2', this.value)">
                <div class="range-metrics" id="range-k2"><em>Диапазон: —</em></div>
            </div>
            <!-- Bradley Window -->
            <div class="slider-group">
                <div class="slider-header"><span>Bradley Window</span><span class="slider-val" id="val-win">8</span></div>
                <input type="range" id="sl-win" min="2" max="64" value="8" step="1" oninput="updateParam('win', this.value)">
                <div class="range-metrics" id="range-win"><em>Диапазон: —</em></div>
            </div>
            <!-- Bradley Sens -->
            <div class="slider-group">
                <div class="slider-header"><span>Bradley S</span><span class="slider-val" id="val-sens">0.15</span></div>
                <input type="range" id="sl-sens" min="0.01" max="0.50" value="0.15" step="0.01" oninput="updateParam('sens', this.value)">
                <div class="range-metrics" id="range-sens"><em>Диапазон: —</em></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-start" onclick="toggleCamera()">Камера</button>
            <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
            <button class="btn-load" onclick="document.getElementById('file-input').click()">Фото</button>
            <button class="btn-reset-ranges" onclick="resetRanges()">Сброс<br>Замеры</button>
        </div>
    </div>

<script>
    // === STATE & CONFIG ===
    const state = {
        activeChannel: 'R',
        isRunning: false,
        staticImageData: null,
        results: { R: null, G: null, B: null },
        config: {
            R: { offset: 0, gain: 1.0, k1: 0.0, k2: 0.0, win: 8, sens: 0.15, neighbors: ['G', 'B'] },
            G: { offset: 0, gain: 1.0, k1: 0.0, k2: 0.0, win: 8, sens: 0.15, neighbors: ['R', 'B'] },
            B: { offset: 0, gain: 1.0, k1: 0.0, k2: 0.0, win: 8, sens: 0.15, neighbors: ['R', 'G'] }
        },
        ranges: { R: {}, G: {}, B: {} }
    };

    // Initialize Range Storage
    ['R', 'G', 'B'].forEach(ch => {
        ['offset', 'gain', 'k1', 'k2', 'win', 'sens'].forEach(param => {
            state.ranges[ch][param] = { min: Infinity, max: -Infinity };
        });
    });

    const els = {
        video: document.getElementById('video-source'),
        canvas: document.getElementById('canvas-display'), // Default 480x480 in HTML
        ctx: document.getElementById('canvas-display').getContext('2d', { willReadFrequently: true })
    };

    // === 1. AUDIO & UI LOGIC ===

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 800; osc.type = 'square';
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    function switchTab(ch) {
        state.activeChannel = ch;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab.${ch.toLowerCase()}`).classList.add('active');

        const conf = state.config[ch];
        document.getElementById('label-k1').innerText = `k1 (${conf.neighbors[0]})`;
        document.getElementById('label-k2').innerText = `k2 (${conf.neighbors[1]})`;

        loadParamsToUI(ch);
        updateRangeDisplay(ch);
        if (state.staticImageData && !state.isRunning) processStaticImage();
    }

    function loadParamsToUI(ch) {
        const conf = state.config[ch];
        document.getElementById('sl-offset').value = conf.offset;
        document.getElementById('sl-gain').value = conf.gain;
        document.getElementById('sl-k1').value = conf.k1;
        document.getElementById('sl-k2').value = conf.k2;
        document.getElementById('sl-win').value = conf.win;
        document.getElementById('sl-sens').value = conf.sens;

        document.getElementById('val-offset').innerText = conf.offset;
        document.getElementById('val-gain').innerText = conf.gain.toFixed(2);
        document.getElementById('val-k1').innerText = conf.k1.toFixed(2);
        document.getElementById('val-k2').innerText = conf.k2.toFixed(2);
        document.getElementById('val-win').innerText = conf.win;
        document.getElementById('val-sens').innerText = conf.sens.toFixed(2);
    }

    function updateParam(key, value) {
        const ch = state.activeChannel;
        let val = parseFloat(value);
        if (key === 'offset' || key === 'win') val = parseInt(value);
        state.config[ch][key] = val;

        const displayEl = document.getElementById(`val-${key === 'sens' ? 'sens' : key}`);
        if(key === 'win' || key === 'offset') displayEl.innerText = val;
        else displayEl.innerText = val.toFixed(2);

        if (state.staticImageData && !state.isRunning) processStaticImage();
    }

    function setLED(ch, status) {
        const el = document.getElementById(`led-${ch.toLowerCase()}`);
        if (status) el.classList.add('active');
        else el.classList.remove('active');
    }

    function updateRangeDisplay(ch) {
        const ranges = state.ranges[ch];
        const params = ['offset', 'gain', 'k1', 'k2', 'win', 'sens'];
        params.forEach(p => {
            const el = document.getElementById(`range-${p}`);
            const r = ranges[p];
            if (r.min !== Infinity && r.max !== -Infinity) {
                let minDisp = (p === 'offset' || p === 'win') ? r.min : r.min.toFixed(2);
                let maxDisp = (p === 'offset' || p === 'win') ? r.max : r.max.toFixed(2);
                el.innerHTML = `<span>Диапазон: ${minDisp} — ${maxDisp}</span>`;
            } else {
                el.innerHTML = `<em>Диапазон: —</em>`;
            }
        });
    }

    function resetRanges() {
        ['R', 'G', 'B'].forEach(ch => {
            ['offset', 'gain', 'k1', 'k2', 'win', 'sens'].forEach(param => {
                state.ranges[ch][param] = { min: Infinity, max: -Infinity };
            });
            state.results[ch] = null;
            setLED(ch, false);
        });
        updateRangeDisplay(state.activeChannel);
    }

    // === 2. FILE HANDLING ===

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (state.isRunning) toggleCamera(); 

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Force 480x480
                els.canvas.width = 480; els.canvas.height = 480;
                const size = Math.min(img.width, img.height);
                const sx = (img.width - size) / 2;
                const sy = (img.height - size) / 2;
                els.ctx.drawImage(img, sx, sy, size, size, 0, 0, 480, 480);
                state.staticImageData = els.ctx.getImageData(0, 0, 480, 480);
                processStaticImage();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // === 3. PROCESSING ENGINE ===

    function handleDecodeSuccess(codeData, ch) {
        const isNew = state.results[ch] !== codeData;
        state.results[ch] = codeData;
        setLED(ch, true);
        if (isNew) playBeep();

        // Range Logic
        const conf = state.config[ch];
        const range = state.ranges[ch];
        const params = ['offset', 'gain', 'k1', 'k2', 'win', 'sens'];
        let updated = false;
        params.forEach(p => {
            let val = conf[p];
            if (p !== 'offset' && p !== 'win') val = parseFloat(val.toFixed(2));
            if (val < range[p].min) { range[p].min = val; updated = true; }
            if (val > range[p].max) { range[p].max = val; updated = true; }
        });
        if (updated) updateRangeDisplay(ch);
    }

    function handleDecodeFail(ch) {
        state.results[ch] = null;
        setLED(ch, false);
    }

    function processStaticImage() {
        if (!state.staticImageData) return;
        const src = state.staticImageData;
        const conf = state.config[state.activeChannel];
        const w = 480, h = 480;
        
        // Create fresh data
        const currentData = new ImageData(new Uint8ClampedArray(src.data), w, h);
        const processedBuffer = new Uint8ClampedArray(w * h);

        // SCI
        for (let i = 0; i < src.data.length; i += 4) {
            let r = src.data[i], g = src.data[i+1], b = src.data[i+2];
            let target, n1, n2;
            if (state.activeChannel === 'R') { target = r; n1 = g; n2 = b; }
            else if (state.activeChannel === 'G') { target = g; n1 = r; n2 = b; }
            else { target = b; n1 = r; n2 = g; }
            let res = (target - (n1 * conf.k1 + n2 * conf.k2)) * conf.gain + conf.offset;
            res = Math.max(0, Math.min(255, res));
            processedBuffer[i/4] = res;
            currentData.data[i] = res; currentData.data[i+1] = res; currentData.data[i+2] = res; currentData.data[i+3] = 255;
        }

        // Bradley
        applyBradley(processedBuffer, currentData, w, h, conf.win, conf.sens);
        els.ctx.putImageData(currentData, 0, 0);

        // Scan with Inversion Attempts
        const code = jsQR(currentData.data, w, h, { inversionAttempts: "attemptBoth" });
        
        if (code) {
            handleDecodeSuccess(code.data, state.activeChannel);
            drawOverlay(code.location);
        } else {
            handleDecodeFail(state.activeChannel);
            console.log("Scan: Pattern detected but decode failed (or no code)."); // Debug log
        }
    }

    function processFrame() {
        if (!state.isRunning) return;
        const video = els.video;
        const canvas = els.canvas;
        const ctx = els.ctx;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            // Ensure 480x480
            if (canvas.width !== 480) { canvas.width = 480; canvas.height = 480; }
            
            const size = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - size) / 2;
            const sy = (video.videoHeight - size) / 2;
            ctx.drawImage(video, sx, sy, size, size, 0, 0, 480, 480);

            const imgData = ctx.getImageData(0, 0, 480, 480);
            const src = imgData.data; 
            const srcCopy = new Uint8ClampedArray(src);
            const processedBuffer = new Uint8ClampedArray(480 * 480);
            const conf = state.config[state.activeChannel];

            // SCI
            for (let i = 0; i < srcCopy.length; i += 4) {
                let r = srcCopy[i], g = srcCopy[i+1], b = srcCopy[i+2];
                let target, n1, n2;
                if (state.activeChannel === 'R') { target = r; n1 = g; n2 = b; }
                else if (state.activeChannel === 'G') { target = g; n1 = r; n2 = b; }
                else { target = b; n1 = r; n2 = g; }
                let res = (target - (n1 * conf.k1 + n2 * conf.k2)) * conf.gain + conf.offset;
                res = Math.max(0, Math.min(255, res));
                processedBuffer[i/4] = res;
                src[i] = res; src[i+1] = res; src[i+2] = res; src[i+3] = 255;
            }

            // Bradley
            applyBradley(processedBuffer, imgData, 480, 480, conf.win, conf.sens);
            ctx.putImageData(imgData, 0, 0);

            // Scan with Inversion Attempts
            const code = jsQR(imgData.data, 480, 480, { inversionAttempts: "attemptBoth" });
            
            if (code) {
                handleDecodeSuccess(code.data, state.activeChannel);
                drawOverlay(code.location);
            } else {
                handleDecodeFail(state.activeChannel);
            }
        }
        requestAnimationFrame(processFrame);
    }

    // === 4. ALGORITHMS ===
    
    function applyBradley(srcGrayBuffer, outImgData, w, h, windowSize, sensitivity) {
        const intImg = new Int32Array(w * h);
        for (let y = 0; y < h; y++) {
            let sum = 0;
            for (let x = 0; x < w; x++) {
                const idx = y * w + x;
                sum += srcGrayBuffer[idx];
                intImg[idx] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
            }
        }
        const s = windowSize; 
        const t = sensitivity; 
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const x1 = Math.max(0, x - s); const x2 = Math.min(w - 1, x + s);
                const y1 = Math.max(0, y - s); const y2 = Math.min(h - 1, y + s);
                const count = (x2 - x1) * (y2 - y1);
                const A = intImg[y2 * w + x2];
                const B = y1 > 0 ? intImg[(y1 - 1) * w + x2] : 0;
                const C = x1 > 0 ? intImg[y2 * w + (x1 - 1)] : 0;
                const D = (y1 > 0 && x1 > 0) ? intImg[(y1 - 1) * w + (x1 - 1)] : 0;
                const sum = A - B - C + D;
                const val = srcGrayBuffer[y * w + x];
                if (val * count < sum * (1.0 - t)) {
                    const pIdx = (y * w + x) * 4;
                    outImgData.data[pIdx] = 0; outImgData.data[pIdx+1] = 0; outImgData.data[pIdx+2] = 0;
                } else {
                    const pIdx = (y * w + x) * 4;
                    outImgData.data[pIdx] = 255; outImgData.data[pIdx+1] = 255; outImgData.data[pIdx+2] = 255;
                }
            }
        }
    }

    function drawOverlay(loc) {
        const ctx = els.ctx;
        ctx.strokeStyle = '#00FF00'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(loc.topLeftCorner.x, loc.topLeftCorner.y);
        ctx.lineTo(loc.topRightCorner.x, loc.topRightCorner.y);
        ctx.lineTo(loc.bottomRightCorner.x, loc.bottomRightCorner.y);
        ctx.lineTo(loc.bottomLeftCorner.x, loc.bottomLeftCorner.y);
        ctx.closePath();
        ctx.stroke();
    }

    // === 5. CAMERA INIT ===
    async function toggleCamera() {
        const btn = document.querySelector('.btn-start');
        if (state.isRunning) {
            state.isRunning = false;
            els.video.pause();
            if(els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            btn.innerText = "Камера";
            return;
        }
        try {
            state.staticImageData = null;
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
            els.video.srcObject = stream;
            els.video.play();
            state.isRunning = true;
            btn.innerText = "Стоп";
            requestAnimationFrame(processFrame);
        } catch (e) { alert("Camera Error: " + e.message); }
    }

    // Init
    switchTab('R');

</script>
</body>
</html>
